services:
  - type: web
    name: sales-api
    runtime: docker
    plan: free
    envVars:
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: sales-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: sales-redis
          property: connectionString

  - type: worker
    name: sales-worker
    runtime: docker
    plan: free
    envVars:
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: sales-redis
          property: connectionString

  - type: web
    name: sales-flower
    runtime: docker
    plan: free
    envVars:
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: sales-redis
          property: connectionString

databases:
  - type: redis
    name: sales-redis
    plan: free
    ipAllowList: [] 
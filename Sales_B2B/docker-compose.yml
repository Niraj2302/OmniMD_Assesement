version: '3.8'

services:
  redis:
    image: redis:alpine

  api:
    build: .
    volumes:
      - ./knowledge:/app/knowledge
      - ./chroma_db:/app/chroma_db
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    build: .
    volumes:
      - ./knowledge:/app/knowledge
      - ./chroma_db:/app/chroma_db
    command: celery -A workers.celery_app.app worker --loglevel=info
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 4G